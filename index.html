<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your game library</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
</head>
<body>
    <div class="header">
        <h1>Your personal Game Library</h1>
        <button class="add-game">
            + ADD GAME
        </button>
    </div>
    <div class="game-container">

    </div>
    <dialog class="add-game-dialog">
            <form id="new-game-form">
                <fieldset>
                    <section class="form-game-name">
                        <label class="form-section-title" for="new-game-name">Name of the Game</label>
                        <input type="text" id="new-game-name" class="text-field" name="new-game-name" placeholder="Enter name of the game" maxlength="18" required>
                    </section>
                    <fieldset class="form-platform-section">
                        <legend class="form-section-title">Choose the platform of the Game</legend>
                        <section>
                            <input type="radio" id="platform-ps5" name="game-platform" value="PS5" required>
                            <label class="radio-text" for="platform-ps5">PS-5</label>
                        </section>
                        <section>
                            <input type="radio" id="platform-pc" name="game-platform" value="PC">
                            <label class="radio-text" for="platform-pc">PC</label>
                        </section>
                        <section>
                            <input type="radio" name="game-platform" id="platform-xbox" value="XBOX">
                            <label class="radio-text" for="platform-xbox">XBOX</label>
                        </section>
                        <section>
                            <input type="radio" name="game-platform" id="platform-switch" value="NINTENDO">
                            <label class="radio-text" for="platform-switch">NINTENDO</label>
                        </section>
                        <section>
                            <input type="radio" name="game-platform" id="platform-other" value="OTHER">
                            <label class="radio-text" for="platform-other">OTHER</label>
                        </section>
                    </fieldset>
                    <section class="form-game-name">
                        <label class="form-section-title" for="game-time-played">Hours played</label>
                        <input class="text-field" type="number" name="game-time-played" id="game-time-played" min="0" step="1" required>
                    </section>
                    <fieldset class="form-platform-section">
                        <legend class="form-section-title">Did you finish the game?</legend>
                        <section>
                            <input type="radio" name="is-finished" id="yes-finished" value="true" required>
                            <label class="radio-text" for="yes-finished">Yes</label>
                        </section>
                        <section>
                            <input type="radio" name="is-finished" id="not-finished" value="false">
                            <label class="radio-text" for="not-finished">No</label>
                        </section>
                    </fieldset>
                    <section class="form-button-section">
                        <button id="add-game" type="submit">ADD GAME</button>
                        <button id="close-modal" type="button">CLOSE</button>
                    </section>
                </fieldset>
            </form>
        </dialog>
</body>
</html>
